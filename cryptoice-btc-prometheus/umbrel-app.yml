name: BTC-Prometheus
tagline: Sovereign Bitcoin full node with built-in monitoring
icon: https://raw.githubusercontent.com/CryptoIceMLH/bitcoin-prometheus/main/cryptoice-btc-prometheus/prometheus128.jpg
category: bitcoin
version: "0.3.3"
