services:
  prometheus-node:
    build: .
    container_name: btc-prometheus
    restart: unless-stopped
    environment:
      - RPC_PORT=8332
    ports:
      - "8333:8333"   # P2P
      - "8332:8332"   # RPC + Metrics (/metrics endpoint)
    volumes:
      - /home/prometheus/.bitcoin:/home/bitcoin/.bitcoin
    command:
      - -printtoconsole

  ui-backend:
    build: ./ui/backend
    container_name: btc-prometheus-api
    restart: unless-stopped
    environment:
      - RPC_HOST=prometheus-node
      - RPC_PORT=8332
      - DATA_DIR=/data
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - /home/prometheus/.bitcoin:/data
    depends_on:
      - prometheus-node

  ui-frontend:
    build: ./ui/frontend
    container_name: btc-prometheus-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - ui-backend

  tor-proxy:
    image: peterdavehello/tor-socks-proxy:latest@sha256:1a21ef796e1c8929d3fac4f06dabb1c4e0734fd0b733a54d5d7ef767bd0eaa85
    container_name: btc-prometheus-tor
    restart: unless-stopped
