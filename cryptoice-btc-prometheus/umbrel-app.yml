description: >-
  BTC-Prometheus is a Bitcoin full node client that puts every policy decision
  in the operator's hands. Features include a Sovereign Controls settings panel,
  fire-themed dark UI, built-in Prometheus metrics endpoint, and privacy-friendly
  defaults. 100% consensus compatible with the Bitcoin network.
developer: BTC-Prometheus Contributors
website: https://github.com/CryptoIceMLH/bitcoin-prometheus
repo: https://github.com/CryptoIceMLH/bitcoin-prometheus
support: https://github.com/CryptoIceMLH/bitcoin-prometheus/issues
gallery: []
releaseNotes: >-
  v0.3.3: Fix Electrs P2P connection by exposing port 8335 as secondary listener.
  v0.3.2 removed whitebind but Umbrel's Electrs app still expects port 8335 for P2P.
  Now expose 8335→8333 so Electrs connects without change. Maintains v0.3.2 fix
  (whitelist-based trusted app handling) while restoring Electrs compatibility.

  v0.3.2: Fix P2P inbound peer connections. Removed whitebind which was overriding
  the main P2P listener (port 8333) and preventing inbound connections from external peers.
  Now uses standard Bitcoin Core whitelist for trusted local apps (Electrs, Fulcrum)
  without disrupting the public P2P listener. Inbound peers should now connect normally.

  v0.3.1: Enable txindex=1 to support Mempool and other blockchain explorers.
  Mempool requires transaction indexing to fetch transactions by txid without a block hash.
  txindex is now enforced on startup (same pattern as server=1) so existing deployments
  get the fix on next restart without a full resync.

  v0.3.0: Fix Bitcoin protocol version reporting for Electrs compatibility.
  CMakeLists.txt now reports version 300000 (v30.0.0) to satisfy Electrs requirement
  of version ≥210000. This separates internal versioning (CMakeLists) from UI display
  version (v0.3.0), allowing protocol-aware apps like Electrs to recognize the node.
  Includes all Phase 1 fixes: JSON-RPC validation, RPC authentication, and cookie mounting.

  v0.2.9: Fix Electrs RPC authentication - mount bitcoin data to /data/.bitcoin
  for cookie access. Electrs can now reach the RPC authentication cookie file.
  Adds secondary read-only volume mount so Electrs sees bitcoin data at expected path.

  v0.2.8: Fix JSON-RPC version validation (Electrs compatibility). Removed strict
  JSON-RPC version checking that rejected non-standard versions. Now silently accepts
  any jsonrpc value as V1_LEGACY, matching Bitcoin Knots behavior. Fixes "unexpected
  structure" errors from Electrs and improves compatibility with wallet-aware clients.

  v0.2.7: Fixed version bump process. Ensure CMakeLists.txt CLIENT_VERSION_BUILD updated on every release.
  Node now correctly reports v0.2.7 in both binary and UI. All version strings synchronized.

  v0.2.6: Fix RPC server=1 always enforced on startup. Restoring blockchain data from backup
  was leaving RPC disabled in bitcoin.conf. Electrs can now authenticate properly.

  v0.2.5: Fix node IP to match Bitcoin Core standard (10.21.21.8). Node now on correct Docker subnet
  with all Umbrel apps — fixes Electrs connectivity. Subnet mismatch prevented peer communication.

  v0.2.4: Fix Electrs/Fulcrum P2P whitebind port (8335) so third-party apps connect correctly.
  Fix node startup UX — shows syncing status instead of node unavailable during block verification.

  v0.2.3: Version bump. Rebuild and re-publish to validate full Umbrel update pipeline.

  v0.2.2: Fix JSON-RPC 1.1 compatibility. prometheusd now accepts JSON-RPC
  version 1.1 requests (treated as legacy 1.0), restoring full compatibility
  with Electrs, Mempool, and other dependent apps.

  v0.2.1: Removed forced Tor proxy from default config. Tor is now optional — users
  can enable it via Sovereign Controls settings if desired.

  v0.2.0: Full Umbrel ecosystem compatibility. Backend structure now matches
  Bitcoin Core standard (bitcoin user, .bitcoin dir, bitcoin.conf). Fixed ZMQ
  port assignments, added APP_BITCOIN_DATA_DIR export, added Tor proxy wiring,
  fixed cookie permissions, Python 3.12 compatibility. Added Mempool card to
  Dashboard. Metrics endpoint now reports accurate blockchain disk size.
